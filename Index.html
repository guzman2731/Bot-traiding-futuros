<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Trading Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #161b22; border-radius: 15px; padding: 20px; width: 90%; max-width: 350px; border: 1px solid #30363d; text-align: center; margin-top: 50px; }
        .balance { font-size: 2em; color: #2ecc71; margin: 10px 0; }
        .btn-trade { background-color: #2ecc71; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <p>Balance Real</p>
        <div class="balance">$0.00 USDT</div>
        <button class="btn-trade" onclick="tg.showAlert('Bot conectado con éxito')">INICIAR BOT</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
