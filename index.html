<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CriptoBot Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: #111; border: 1px solid #00ff00; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .price { font-size: 32px; color: #00ff00; font-weight: bold; }
        .btn { background: #00ff00; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <h2>MI PANEL DE TRADING</h2>
    <div class="card">
        <p>Balance Estimado</p>
        <div class="price">0.00 USDT</div>
    </div>
    <button class="btn" onclick="Telegram.WebApp.close()">CERRAR APP</button>
</body>
</html>
