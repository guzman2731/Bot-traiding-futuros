<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="cryptomus" content="4ccd6891">
    <title>Trading Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-color: #0b1616; --card-bg: #142626; --accent: #26e0b8; --text-gray: #8ba3a3; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .main-card { margin: 15px; padding: 25px; background: var(--card-bg); border-radius: 12px; text-align: center; }
        .balance-val { font-size: 42px; font-weight: bold; margin: 10px 0; color: white; }
        .btn-pay { background: var(--card-bg); color: white; padding: 16px; border: 1px solid var(--accent); border-radius: 12px; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-pay span { background: var(--accent); color: #0b1616; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="main-card">
        <p style="color: var(--text-gray);">Balance Total</p>
        <div class="balance-val">$0.00</div>
        <button class="btn-pay" onclick="window.location.href='AQUÍ_PONDREMOS_EL_LINK_LUEGO'">
            Pagar Suscripción <span>10 USDT</span>
        </button>
    </div>
</body>
</html>
