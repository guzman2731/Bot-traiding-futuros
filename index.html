<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-color: #0b1616; --card-bg: #142626; --accent: #26e0b8; --text-gray: #8ba3a3; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .header { padding: 15px; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .main-card { margin: 15px; padding: 25px; background: var(--card-bg); border-radius: 20px; text-align: center; border: 1px solid #1f3d3d; }
        .balance-val { font-size: 42px; font-weight: bold; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .usdt-logo { width: 32px; height: 32px; background: #26a17b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        
        .payment-section { padding: 0 15px; margin-bottom: 80px; }
        .payment-title { font-size: 13px; color: var(--accent); font-weight: bold; margin-bottom: 12px; text-align: left; text-transform: uppercase; }
        .btn-pay { background: var(--card-bg); color: white; padding: 16px; border-radius: 12px; border: 1px solid var(--accent); font-weight: bold; width: 100%; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; font-size: 14px; box-sizing: border-box; }
        .btn-pay span { background: var(--accent); color: #0b1616; padding: 2px 8px; border-radius: 5px; font-size: 11px; }
        .btn-card { border-color: #f3ba2f; } 
        .btn-card span { background: #f3ba2f; }
    </style>
</head>
<body>
    <div class="header">👤 <b>Ran2731</b> <span style="margin-left: auto;">🔔 🌐</span></div>
    
    <div class="main-card">
        <div style="color:var(--accent); font-size:13px; font-weight:bold;">🔥 (USDT Trade Rights)</div>
        <div class="balance-val"><div class="usdt-logo">₮</div> <span id="saldo-pantalla">0.00</span></div>
        <div style="color: var(--text-gray); font-size: 14px;">Ganancia diaria: <span style="color:var(--accent)">+5.50%</span></div>
    </div>

    <div class="payment-section">
        <div class="payment-title">Pagar con Tarjeta (Zinli, Wally, USD)</div>
        <a href="https://www.binance.com/es/crypto/buy/USD/USDT" target="_blank" class="btn-pay btn-card">
            Comprar USDT con Tarjeta 💳 <span>VISA/MC</span>
        </a>

        <div class="payment-title" style="margin-top:20px;">Pagar con Cripto Directo</div>
        <a href="https://pay.oxapay.com/18805505" target="_blank" class="btn-pay">
            Recargar 10 USDT <span>₮</span>
        </a>

        <div class="payment-title" style="margin-top:20px;">¿Necesitas ayuda?</div>
        <a href="https://t.me/TuUsuarioDeTelegram" target="_blank" class="btn-pay" style="border-color: #24A1DE;">
            Contactar a Soporte 📩 <span>CHAT</span>
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA1EZJ87ev6Tj8XnIpPEvDUTZjp2j_H9Y",
            authDomain: "bottraiding2731.firebaseapp.com",
            projectId: "bottraiding2731",
            storageBucket: "bottraiding2731.firebasestorage.app",
            messagingSenderId: "471008578191",
            appId: "1:471008578191:web:fa537d38aac3b1647d3efa"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Escuchar saldo real: Busca en la colección 'usuarios' el documento 'Ran2731'
        db.collection("usuarios").doc("Ran2731").onSnapshot((doc) => {
            if (doc.exists) {
                // Importante: El campo en Firebase debe llamarse 'saldo'
                document.getElementById("saldo-pantalla").innerText = parseFloat(doc.data().saldo).toFixed(2);
            }
        });

        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
