<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-color: #0b1616; --card-bg: #142626; --accent: #26e0b8; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #1f3d3d; margin-top: 20px; }
        .balance { font-size: 48px; font-weight: bold; color: white; margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn { background: var(--accent); color: #0b1616; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
    <div style="text-align: left;">👤 <b>Ran2731</b></div>
    <div class="card">
        <div style="color:var(--accent); font-weight:bold; font-size: 12px;">🔥 (USDT Trade Rights)</div>
        <div class="balance">₮ <span id="saldo-pantalla">...</span></div>
        <div style="color: #8ba3a3; font-size: 14px;">Ganancia diaria: <span style="color:var(--accent)">+5.50%</span></div>
    </div>
    <button class="btn" onclick="pagar()">₮ Comprar USDT 🔥</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCA1EZJ87ev6Tj8XnIpPEvDUTZjp2j_H9Y",
            authDomain: "bottraiding2731.firebaseapp.com",
            projectId: "bottraiding2731",
            storageBucket: "bottraiding2731.firebasestorage.app",
            messagingSenderId: "471008578191",
            appId: "1:471008578191:web:fa537d38aac3b1647d3efa"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Escucha el saldo en tiempo real
        db.collection("usuarios").doc("Ran2731").onSnapshot((doc) => {
            if (doc.exists) {
                document.getElementById("saldo-pantalla").innerText = parseFloat(doc.data().saldo).toFixed(2);
            } else {
                document.getElementById("saldo-pantalla").innerText = "0.00";
            }
        });

        function pagar() {
            Telegram.WebApp.showAlert("Para recargar con tarjeta o USDT, contacta a soporte.");
        }

        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
